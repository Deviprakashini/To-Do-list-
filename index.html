<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Magical Kids To-Do List</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>✨ Magical Kids To-Do List ✨</h1>

<div class="input-box">

<input
type="text"
id="taskInput"
placeholder=""Please enter a task 😊">

<button id="addBtn">
Add
</button>

</div>

<div class="filters">

<button
class="filter active"
data-filter="all">
All
</button>

<button
class="filter"
data-filter="active">
Active
</button>

<button
class="filter"
data-filter="completed">
Completed
</button>

</div>

<h3 id="taskCount"></h3>

<div id="taskList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
